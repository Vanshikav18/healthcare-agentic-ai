<!DOCTYPE html>
<html>
<head>
    <title>Healthcare AI Assistant</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 500px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            border: 2px solid #e53935;
            box-shadow: 0px 8px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            color: #e53935;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e53935;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            margin-bottom: 15px;
        }

        input:focus {
            border-color: #b71c1c;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #e53935;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #b71c1c;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background: #fff5f5;
            border-left: 5px solid #e53935;
            text-align: left;
            max-height: 250px;
            overflow-y: auto;
        }

        .result h3 {
            color: #e53935;
            margin-top: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>❤️ Healthcare AI Assistant</h1>

    <form method="POST">
        <input 
            type="text" 
            name="input"
            placeholder="Enter your health goal (e.g., diabetes treatment plan)"
            required
        >
        <button type="submit">Generate Plan</button>
    </form>

    {% if result %}
    <div class="result">
        <h3>Generated Plan:</h3>
        <pre>{{ result }}</pre>
    </div>
    {% endif %}
</div>

</body>
</html>
